<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text2: #8892b0;
    --accent: #4f8cff;
    --accent2: #6c63ff;
    --gold: #f0c040;
    --success: #4ade80;
    --warn: #fbbf24;
    --pink: #f472b6;
    --cyan: #22d3ee;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  .nav {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-logo-img { width: 32px; height: 32px; border-radius: 8px; }
  .nav-title { font-size: 16px; font-weight: 600; }
  .nav-title span { color: var(--accent); }
  .nav-subtitle { font-size: 11px; color: var(--text2); }
  .nav-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 8px 16px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(79,140,255,0.3); }
  .btn-success { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }
  .btn-success:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(5,150,105,0.3); }
  .btn-warn { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; }
  .btn-warn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(217,119,6,0.3); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--card2); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .section-card h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-card h2 small { font-size: 12px; color: var(--text2); font-weight: 400; }
  textarea {
    width: 100%; min-height: 180px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-size: 14px; line-height: 1.7;
    resize: vertical; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); opacity: 0.5; }
  .config-row { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; align-items: center; }
  .config-group { display: flex; flex-direction: column; gap: 4px; }
  .config-group label { font-size: 12px; color: var(--text2); }
  .config-group select, .config-group input {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; outline: none;
  }
  .config-group select:focus, .config-group input:focus { border-color: var(--accent); }
  .char-counter { text-align: right; font-size: 12px; color: var(--text2); margin-top: 6px; }
  .action-bar { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 16px;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(79,140,255,0.05); }
  .upload-zone .icon { font-size: 40px; margin-bottom: 8px; }
  .upload-zone .text { font-size: 14px; color: var(--text2); }
  .upload-zone .sub { font-size: 12px; color: var(--text2); opacity: 0.6; margin-top: 4px; }
  .upload-zone input[type="file"] { display: none; }
  /* Mode toggle */
  .mode-toggle {
    display: inline-flex; gap: 0;
    background: var(--card2);
    border-radius: 10px; padding: 3px;
    border: 1px solid var(--border);
  }
  .mode-btn {
    padding: 8px 18px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    color: var(--text2); background: transparent;
    cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(79,140,255,0.3); }
  .mode-btn:hover:not(.active) { color: var(--text); }
  /* Episode tabs */
  .episode-tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin: 16px 0; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .episode-tab {
    padding: 8px 16px; border-radius: 8px;
    background: var(--card2); color: var(--text2);
    cursor: pointer; transition: all 0.2s;
    font-size: 13px; border: 1px solid transparent;
  }
  .episode-tab:hover { border-color: var(--accent); color: var(--text); }
  .episode-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .episode-tab .badge {
    display: inline-block; margin-left: 6px;
    background: rgba(255,255,255,0.15); padding: 0 6px;
    border-radius: 4px; font-size: 11px;
  }
  .episode-tab.active .badge { background: rgba(255,255,255,0.25); }
  /* Phase tabs */
  .phase-tabs {
    display: flex; gap: 4px;
    background: var(--card2);
    border-radius: 10px; padding: 4px;
    margin: 12px 0;
    overflow-x: auto;
  }
  .phase-tab {
    flex: 1; min-width: 100px;
    padding: 10px 12px; text-align: center;
    border-radius: 8px; font-size: 13px;
    color: var(--text2); cursor: pointer;
    transition: all 0.2s;
    border: none; background: none;
    white-space: nowrap;
  }
  .phase-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .phase-tab.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .phase-tab .step { font-size: 10px; opacity: 0.6; display: block; }
  .phase-tab .label { font-weight: 500; }
  .phase-tab.done::after { content: ' ✅'; font-size: 12px; }
  .phase-content { display: none; }
  .phase-content.active { display: block; }
  /* Duration */
  .duration-grid { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
  .dur-opt {
    padding: 6px 14px; border-radius: 8px;
    background: var(--card2); color: var(--text2);
    border: 1px solid var(--border); cursor: pointer;
    font-size: 12px; transition: all 0.2s;
  }
  .dur-opt:hover { border-color: var(--accent); }
  .dur-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* Cards */
  .storyboard-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .sb-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .sb-num {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .sb-time {
    font-size: 12px; color: var(--gold); font-weight: 600;
    background: rgba(240,192,64,0.1);
    padding: 2px 10px; border-radius: 4px;
  }
  .sb-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .sb-tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px; background: var(--card2); color: var(--text2);
  }
  .sb-original-text {
    font-size: 13px; color: var(--gold);
    background: rgba(240,192,64,0.08);
    border-left: 3px solid var(--gold);
    padding: 8px 12px;
    margin-bottom: 8px;
    border-radius: 0 6px 6px 0;
  }
  .sb-desc { font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
  .sb-prompt {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: var(--success);
    line-height: 1.7;
    font-family: 'SF Mono', 'Courier New', monospace;
    word-break: break-all;
    position: relative;
    margin-top: 8px;
  }
  .sb-prompt-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .copy-btn {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 8px; font-size: 11px;
    background: var(--card2); color: var(--text2);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; transition: all 0.2s;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .prompt-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 12px 0;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    position: relative;
  }
  .prompt-box .copy-btn { top: 12px; right: 12px; }
  .summary-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex; flex-wrap: wrap; gap: 16px;
    align-items: center;
  }
  .summary-item { text-align: center; }
  .summary-item .num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .summary-item .label { font-size: 11px; color: var(--text2); }
  .loading-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; display: none; }
  .loading-bar.active { display: block; }
  .loading-bar-inner { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 2px; animation: loading 2s ease-in-out infinite; }
  @keyframes loading { 0% { width: 0%; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0%; margin-left: 100%; } }
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 999;
    padding: 12px 20px; border-radius: 8px;
    font-size: 13px; transform: translateX(120%); transition: transform 0.3s;
    max-width: 360px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: #065f46; color: #a7f3d0; border: 1px solid #059669; }
  .toast.error { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
  .toast.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
  .split-config { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; margin: 12px 0; padding: 12px; background: var(--card2); border-radius: 8px; }
  .placeholder-text { color: var(--text2); font-size: 13px; text-align: center; padding: 40px 20px; }
  .history-list { display: none; margin-top: 16px; }
  .history-list.active { display: block; }
  .history-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item .h-name { font-size: 14px; font-weight: 500; }
  .history-item .h-meta { font-size: 11px; color: var(--text2); }
  .history-item .h-del { color: var(--text2); cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.2s; }
  .history-item .h-del:hover { background: rgba(255,0,0,0.1); color: #f87171; }
  .episode-content { display: none; }
  .episode-content.active { display: block; }
  .episode-preview { 
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin: 12px 0;
    max-height: 200px; overflow-y: auto;
    font-size: 13px; line-height: 1.7;
    white-space: pre-wrap;
  }
  @media (max-width: 600px) {
    .container { padding: 16px 12px; }
    .section-card { padding: 16px; }
    .config-row { flex-direction: column; align-items: stretch; }
    .phase-tab { min-width: 80px; font-size: 12px; padding: 8px; }
  }
</style>
</head>

};
const MODELS = { 'gpt-4o': 'gpt-4o', 'deepseek': 'deepseek-chat', 'grok': 'grok-beta', 'claude': 'claude-3-sonnet-20241022', 'custom': '' };

// ==================== STATE ====================
let episodes = [];
let currentEpisodeIdx = 0;
let currentPhaseIdx = 0;
let currentMode = 'standard'; // 'standard' | 'narrative'

// ==================== STORAGE ====================
function saveHistory(data) {
  const h = JSON.parse(localStorage.getItem('sb3_history') || '[]');
  h.unshift({ id: Date.now(), data: data, name: data.title || `分镜 ${new Date().toLocaleString('zh-CN')}`, time: new Date().toISOString() });
  if (h.length > 10) h.pop();
  localStorage.setItem('sb3_history', JSON.stringify(h));
}
function loadHistory() { return JSON.parse(localStorage.getItem('sb3_history') || '[]'); }
function deleteHistory(id) { let h = loadHistory().filter(x => x.id !== id); localStorage.setItem('sb3_history', JSON.stringify(h)); renderHistory(); }
function loadAPIKey() { document.getElementById('api-key').value = localStorage.getItem('sb3_api_key') || ''; }
function saveAPIKey() { localStorage.setItem('sb3_api_key', document.getElementById('api-key').value); }

// ==================== PROJECT SYSTEM ====================
function getProjects() {
  return JSON.parse(localStorage.getItem('sb3_projects') || '[]');
}
function getCurrentProject() {
  return localStorage.getItem('sb3_current_project') || '';
}
function setCurrentProject(name) {
  localStorage.setItem('sb3_current_project', name);
}

function saveProject(name, data) {
  let projects = getProjects();
  const idx = projects.findIndex(p => p.name === name);
  const proj = { name: name, data: data, updated: Date.now() };
  if (idx >= 0) projects[idx] = proj;
  else projects.push(proj);
  localStorage.setItem('sb3_projects', JSON.stringify(projects));
  renderProjects();
}

function loadProject(name) {
  const projects = getProjects();
  const proj = projects.find(p => p.name === name);
  return proj ? proj.data : null;
}

function deleteProjectDB(name) {
  let projects = getProjects().filter(p => p.name !== name);
  localStorage.setItem('sb3_projects', JSON.stringify(projects));
  renderProjects();
}

function renderProjects() {
  const sel = document.getElementById('project-select');
  const projects = getProjects();
  const current = getCurrentProject();
  sel.innerHTML = '<option value="">-- 选择项目 --</option>' + 
    projects.map(p => `<option value="${escHtml(p.name)}" ${p.name === current ? 'selected' : ''}>${escHtml(p.name)}</option>`).join('');
}

function switchProject() {
  const name = document.getElementById('project-select').value;
  if (!name) {
    setCurrentProject('');
    episodes = [];
    document.getElementById('script-input').value = '';
    document.getElementById('step-split').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('episode-content-area').innerHTML = '';
    return;
  }
  // Save current first
  if (episodes.length > 0 || document.getElementById('script-input').value.trim()) {
    const old = getCurrentProject();
    if (old) {
      saveProject(old, { script: document.getElementById('script-input').value, episodes: episodes });
    }
  }
  setCurrentProject(name);
  const data = loadProject(name);
  if (data) {
    document.getElementById('script-input').value = data.script || '';
    document.getElementById('char-count').textContent = data.script ? data.script.length : 0;
    episodes = data.episodes || [];
    document.getElementById('step-split').style.display = episodes.length > 0 ? 'block' : 'none';
    document.getElementById('result-section').style.display = episodes.length > 0 ? 'block' : 'none';
    if (episodes.length > 0) {
      currentEpisodeIdx = 0;
      renderEpisodeTabs();
      showEpisode(0);
      updateSummary();
    }
  }
}

function createProject() {
  const name = document.getElementById('project-name').value.trim();
  if (!name) { showToast('请输入项目名称', 'error'); return; }
  let projects = getProjects();
  if (projects.find(p => p.name === name)) { showToast('项目名已存在', 'error'); return; }
  // Save current
  if (episodes.length > 0 || document.getElementById('script-input').value.trim()) {
    const old = getCurrentProject();
    if (old) saveProject(old, { script: document.getElementById('script-input').value, episodes: episodes });
  }
  setCurrentProject(name);
  episodes = [];
  document.getElementById('script-input').value = '';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('step-split').style.display = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('episode-content-area').innerHTML = '';
  saveProject(name, { script: '', episodes: [] });
  document.getElementById('project-name').value = '';
  showToast('✅ 已创建项目: ' + name);
}

function deleteProject() {
  const name = getCurrentProject();
  if (!name) { showToast('没有选中的项目', 'error'); return; }
  if (!confirm('确认删除项目「' + name + '」？数据不可恢复。')) return;
  deleteProjectDB(name);
  if (name === getCurrentProject()) setCurrentProject('');
  episodes = [];
  document.getElementById('script-input').value = '';
  document.getElementById('step-split').style.display = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('episode-content-area').innerHTML = '';
  showToast('🗑️ 已删除项目');
}

// ==================== DOWNLOAD LOCAL ====================
function downloadLocal() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob(['<!DOCTYPE html>\n' + html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '一抹金蓝分镜工厂-v3.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ 下载成功，团队直接打开此文件即可使用');
}

// ==================== CORS PROXY ====================
let useCorsProxy = false;

async function callAIWithCors(endpoint, apiKey, model, systemPrompt, userContent) {
  try {
    return await callAI(endpoint, apiKey, model, systemPrompt, userContent);
  } catch (err) {
    // CORS error? Try proxy
    if (err.message.includes('fetch') || err.message.includes('network') || err.message.includes('CORS') || err.message.includes('Failed to fetch')) {
      const proxyEndpoint = 'https://corsproxy.io/?' + encodeURIComponent(endpoint);
      try {
        return await callAI(proxyEndpoint, apiKey, model, systemPrompt, userContent);
      } catch(e2) {
        // Try another proxy
        const proxy2 = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(endpoint);
        return await callAI(proxy2, apiKey, model, systemPrompt, userContent);
      }
    }
    throw err;
  }
}

// ==================== UI HELPERS ====================
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;

function toggleHistory() {

function renderHistory() {
  const c = document.getElementById('history-items');

function loadHistoryItem(id) {
  const item = loadHistory().find(x => x.id === id);

  episodes = item.data.episodes || [];

  document.getElementById('result-section').style.display = 'block';
  document.getElementById('history-list').classList.remove('active');

  updateSummary();
  showToast('已加载历史记录');

function showSettings() {
  const k = document.getElementById('api-key');

// ==================== MODE SWITCH ====================

// ==================== FILE UPLOAD ====================
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'txt') {
    reader.onload = e => {
      document.getElementById('script-input').value = e.target.result;
      document.getElementById('char-count').textContent = e.target.result.length;
      showToast('✅ 已读取剧本文件');
      onScriptReady();
    };
    reader.readAsText(file);
  } else if (ext === 'docx') {
    reader.onload = async e => {
      try {
        const result = await mammoth.extractRawText({arrayBuffer: e.target.result});
        document.getElementById('script-input').value = result.value;
        document.getElementById('char-count').textContent = result.value.length;
        showToast('✅ 已读取 Word 文件');
        onScriptReady();
      } catch(err) {
        showToast('❌ 读取失败: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    showToast('❌ 不支持的文件格式', 'error');
  }
  event.target.value = '';
}

const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) { const input = document.getElementById('file-input'); const dt = new DataTransfer(); dt.items.add(file); input.files = dt.files; handleFileUpload({target: input}); }
});

function onScriptReady() {
  document.getElementById('step-split').style.display = 'block';
  document.getElementById('result-section').style.display = 'block';
  splitEpisodes();
}

// ==================== SPLIT EPISODES ====================
function splitEpisodes() {
  const script = document.getElementById('script-input').value.trim();
  if (!script) { showToast('请先输入或上传剧本', 'error'); return; }

  const epDuration = parseInt(document.getElementById('episode-duration').value);
  const keywordsRaw = document.getElementById('split-keywords').value.trim() || '第\\d+集,第\\d+章,Episode,\\d+\\.';
  const keywords = keywordsRaw.split(',').map(k => k.trim()).filter(Boolean);

  let parts = [];

  if (epDuration > 0) {
    // 约3.5字/秒 = 210字/分钟，按360-450字/分钟视频速率调整
    const charsPerEp = Math.round(epDuration * 3.5);
    let remaining = script;
    let epIdx = 1;
    while (remaining.length > 0) {
      let chunk = remaining.substring(0, charsPerEp);
      const nextNewline = chunk.lastIndexOf('\n');
      if (nextNewline > charsPerEp * 0.7) chunk = remaining.substring(0, nextNewline);
      parts.push({ title: `第${epIdx}集`, content: chunk.trim() });
      remaining = remaining.substring(chunk.length).trim();
      epIdx++;
      if (epIdx > 200) break;
    }
  } else {
    const lines = script.split('\n');
    let currentEp = { title: '第1集', content: '' };
    let epNum = 1;
    let found = false;

    for (const line of lines) {
      let isNewEp = false;
      for (const kw of keywords) {
        try { if (new RegExp(kw).test(line.trim())) { isNewEp = true; break; } } catch(e) {
          if (line.trim().includes(kw)) { isNewEp = true; break; }
        }
      }
      if (isNewEp) {
        if (currentEp.content.trim()) parts.push(currentEp);
        epNum++;
        currentEp = { title: line.trim() || `第${epNum}集`, content: '' };
        found = true;
      } else {
        if (currentEp.content) currentEp.content += '\n';
        currentEp.content += line;
      }
    }
    if (currentEp.content.trim()) parts.push(currentEp);
    if (!found) parts = [{ title: '第1集', content: script }];
  }

  episodes = parts.map((p, i) => ({
    title: p.title || `第${i+1}集`,
    rawContent: p.content,
    characters: null,
    scene: null,
    storyboards: null,
    durationMode: 'auto'
  }));

  renderEpisodeTabs();
  showEpisode(0);
  updateSummary();
  document.getElementById('episode-content-area').style.display = 'block';

  const ep = episodes[idx];

  const scenesDone = ep.scene ? 'done' : '';

// ==================== AI CALL ====================
function getApiKey() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) { showToast('请输入 API Key', 'error'); return null; }
  saveAPIKey();
  return key;
}

async function callAIAndShow(idx, prompt, field, successMsg, phaseId) {
  // Save project state
  const projName = getCurrentProject();
  if (projName) {
    saveProject(projName, { script: document.getElementById('script-input').value, episodes: episodes });
  }
  const apiKey = getApiKey();
  if (!apiKey) return;
  const model = document.getElementById('model-select').value;
  const style = document.getElementById('style-preset').value;
  const loadingBar = document.getElementById('loading-bar-' + phaseId);
  if (loadingBar) loadingBar.classList.add('active');

  try {
    const systemPrompt = `你是一位AI视频分镜导演。

核心约束（必须遵守）：
1. 剧本原文绝对不改 — 解说漫模式下的原文必须逐字复制
2. 每个分镜的提示词（中文）必须包含角色台词内容（角色名+语气+原话）
3. 长对话必须切换镜头视角（过肩/反打/正反打），禁止同一机位持续超过10秒
4. 严格按照输出格式返回纯文本结果，不要使用markdown格式

风格要求：${STYLE_PROMPTS[style]}`;

    const endpoint = model === 'custom' ? document.getElementById('custom-endpoint').value.trim() || ENDPOINTS.deepseek : ENDPOINTS[model];
    const result = await callAI(endpoint, apiKey, model, systemPrompt, prompt);

    if (field === 'storyboards') {
      episodes[idx].storyboards = parseStoryboardResponse(result);
    } else {
      episodes[idx][field] = result;
    }

    showEpisode(currentEpisodeIdx);
    updateSummary();
    showToast(`✅ ${successMsg}`);
  } catch (err) {
    showToast('生成失败: ' + err.message, 'error');
  } finally {
    if (loadingBar) loadingBar.classList.remove('active');
  }
}

function parseStoryboardResponse(text) {
  const shots = [];
  const blocks = text.split('===').filter(b => b.trim());

  for (const block of blocks) {
    const lines = block.trim().split('\n').filter(l => l.trim());
    let shot = { num: shots.length + 1, duration: 6, time: '6s', desc: '', prompt: '', promptEn: '', promptCn: '', shotType: '', movement: '', originalText: '', characterLines: '' };

    for (const line of lines) {
      const l = line.trim();
      if (l.match(/^分镜\d+/)) {
        const durMatch = l.match(/(\d+)[s秒]/);
        if (durMatch) { shot.duration = parseInt(durMatch[1]); shot.time = durMatch[1] + 's'; }
        const rangeMatch = l.match(/(\d+)[s秒]-(\d+)[s秒]/);
        if (rangeMatch) shot.time = rangeMatch[1] + '-' + rangeMatch[2] + 's';
      } else if (l.startsWith('景别')) shot.shotType = l.replace(/^景别[：:]\s*/, '');
      else if (l.startsWith('运镜')) shot.movement = l.replace(/^运镜[：:]\s*/, '');
      else if (l.match(/^角色对话/)) shot.characterLines = l.replace(/^角色对话[：:]\s*/, '');
      else if (l.match(/^对话/)) shot.characterLines = l.replace(/^对话[：:]\s*/, '');
      else if (l.match(/^对应原文/) || l.startsWith('🎙️')) shot.originalText = l.replace(/^对应原文[：:]\s*/, '').replace('🎙️ ', '');
      else if (l.match(/^画面描述[：:]/)) shot.desc = l.replace(/^画面描述[：:]\s*/, '');
      else if (l.match(/^画面[：:]/) && !l.includes('描述')) shot.desc = l.replace(/^画面[：:]\s*/, '');
      else if (l.match(/^提示词（中文）/)) shot.promptCn = l.replace(/^提示词（中文）[：:]\s*/, '');
      else if (l.match(/^提示词（English）/)) shot.promptEn = l.replace(/^提示词（English）[：:]\s*/, '');
      else if (l.match(/^提示词[：:]/) && !l.match(/English|中文/)) {
        shot.prompt = l.replace(/^提示词[：:]\s*/, '');
      } else if (l.match(/^Prompt[：:]/i) && l.match(/English|en/i)) {
        shot.promptEn = l.replace(/^Prompt[（(]English[）)]?[：:]\s*/i, '');
      } else if (l.match(/^Prompt[：:]/i)) {
        shot.prompt = l.replace(/^Prompt[：:]\s*/i, '');
      }
    }

    if (shot.desc && (shot.prompt || shot.promptCn || shot.promptEn)) {
      if (!shot.promptCn) shot.promptCn = shot.prompt || '';
      if (!shot.promptEn) shot.promptEn = '';
      if (!shot.prompt) shot.prompt = shot.promptCn;
      shots.push(shot);
    }
  }

  // Fallback
  if (shots.length === 0) {
    const lines = text.split('\n').filter(l => l.trim());
    let current = null;
    for (const line of lines) {
      const l = line.trim();
      if (l.match(/^分镜\s*\d+/)) {
        if (current && current.desc) shots.push(Object.assign({ prompt: '', promptCn: '', promptEn: '' }, current));
        current = { num: shots.length + 1, duration: 6, time: '6s', desc: '', prompt: '', promptCn: '', promptEn: '', shotType: '', movement: '', characterLines: '' };
        const durMatch = l.match(/(\d+)[s秒]/);
        if (durMatch) { current.duration = parseInt(durMatch[1]); current.time = durMatch[1] + 's'; }
      } else if (current) {
        if (l.startsWith('景别')) current.shotType = l.replace(/^景别[：:]\s*/, '');
        else if (l.startsWith('运镜')) current.movement = l.replace(/^运镜[：:]\s*/, '');
        else if (l.match(/^画面|^描述/)) current.desc += l.replace(/^画面[：:]\s*/, '').replace(/^描述[：:]\s*/, '');
        else if (l.match(/提示词/i)) {
          if (l.match(/English|英文/)) current.promptEn += l.replace(/^提示词[（(]English[）)]?[：:]\s*/i, '');
          else if (l.match(/中文/)) current.promptCn += l.replace(/^提示词（中文）[：:]\s*/, '');
          else current.prompt += l.replace(/^提示词[：:]\s*/i, '');
        } else if (!l.match(/^==+/)) {
          if (!current.desc) current.desc = l;
        }
      }
    }
    if (current && current.desc) shots.push(Object.assign({ prompt: '', promptCn: '', promptEn: '' }, current));
  }

  return shots;
}

// ==================== AI API with CORS fallback ====================
async function callAIDirect(endpoint, apiKey, model, systemPrompt, userContent) {
  if (model === 'claude') {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-3-sonnet-20241022', max_tokens: 8192, system: systemPrompt, messages: [{ role: 'user', content: userContent }] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    return data.content[0].text;
  } else {
    let m = MODELS[model] || model;
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: m, messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userContent }], max_tokens: 8192, temperature: 0.7 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    return data.choices[0].message.content;
  }
}

async function callAI(endpoint, apiKey, model, systemPrompt, userContent) {
  try {
    return await callAIDirect(endpoint, apiKey, model, systemPrompt, userContent);
  } catch (err) {
    // Auto CORS retry
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(endpoint);
    try {
      showToast('🔄 直连失败，自动切换CORS代理...', 'info');
      return await callAIDirect(proxyUrl, apiKey, model, systemPrompt, userContent);
    } catch(e2) {
      throw err; // throw original error
    }
  }
}

// ==================== COPY ====================
function copyText(id) {
  const el = document.getElementById(id);
  if (!el) return;
  copyToClipboard(el.textContent);
}

function copyAllShots(idx) {
  const shots = episodes[idx]?.storyboards;
  if (!shots || !shots.length) return;
  const isNarrative = currentMode === 'narrative';
  let text = `=== ${episodes[idx].title} 分镜 ===\n`;
  if (isNarrative) text += '模式：解说漫\n';
  text += `总镜头：${shots.length}\n\n`;
  shots.forEach((s, i) => {
    text += `分镜${i+1} | ${s.time}\n`;
    if (s.shotType) text += `景别：${s.shotType}\n`;
    if (s.movement) text += `运镜：${s.movement}\n`;
    if (s.characterLines) text += `对话：${s.characterLines}\n`;
    if (s.originalText) text += `原文：${s.originalText}\n`;
    text += `画面：${s.desc}\n`;
    text += `提示词（中文）：${s.promptCn || s.prompt || ''}\n`;
    if (s.promptEn) text += `提示词（English）：${s.promptEn}\n`;
    text += '\n';
  });
  copyToClipboard(text);
}

function copySinglePrompt(idx, shotIdx) {
  const shot = episodes[idx]?.storyboards?.[shotIdx];
  if (!shot) return;
  copyToClipboard(shot.promptCn || shot.prompt || '');
}

function copySinglePromptEn(idx, shotIdx) {
  const shot = episodes[idx]?.storyboards?.[shotIdx];
  if (!shot) return;
  copyToClipboard(shot.promptEn || '');
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('✅ 已复制');
  });
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== SUMMARY ====================
function updateSummary() {
  document.getElementById('sb-count').textContent = episodes.length;
  let totalDuration = 0;
  let totalShots = 0;
  for (const ep of episodes) {
    if (ep.storyboards) {
      totalShots += ep.storyboards.length;
      totalDuration += ep.storyboards.reduce((sum, s) => sum + (s.duration || 6), 0);
    }
  }
  document.getElementById('sb-total-duration').textContent = totalDuration + 's';
  document.getElementById('sb-total-shots').textContent = totalShots;
}
