<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一抹金蓝 · 短剧分镜工厂 v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text2: #8892b0;
    --accent: #4f8cff;
    --accent2: #6c63ff;
    --gold: #f0c040;
    --success: #4ade80;
    --warn: #fbbf24;
    --pink: #f472b6;
    --cyan: #22d3ee;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  .nav {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: bold; color: #fff;
  }
  .nav-title { font-size: 16px; font-weight: 600; }
  .nav-title span { color: var(--accent); }
  .nav-subtitle { font-size: 11px; color: var(--text2); }
  .nav-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 8px 16px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(79,140,255,0.3); }
  .btn-success { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }
  .btn-success:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(5,150,105,0.3); }
  .btn-warn { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; }
  .btn-warn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(217,119,6,0.3); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--card2); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .section-card h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-card h2 small { font-size: 12px; color: var(--text2); font-weight: 400; }
  textarea {
    width: 100%; min-height: 180px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-size: 14px; line-height: 1.7;
    resize: vertical; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); opacity: 0.5; }
  .config-row { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; align-items: center; }
  .config-group { display: flex; flex-direction: column; gap: 4px; }
  .config-group label { font-size: 12px; color: var(--text2); }
  .config-group select, .config-group input {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; outline: none;
  }
  .config-group select:focus, .config-group input:focus { border-color: var(--accent); }
  .char-counter { text-align: right; font-size: 12px; color: var(--text2); margin-top: 6px; }
  .action-bar { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  /* Upload */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 16px;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(79,140,255,0.05); }
  .upload-zone .icon { font-size: 40px; margin-bottom: 8px; }
  .upload-zone .text { font-size: 14px; color: var(--text2); }
  .upload-zone .sub { font-size: 12px; color: var(--text2); opacity: 0.6; margin-top: 4px; }
  .upload-zone input[type="file"] { display: none; }
  /* Episode tabs */
  .episode-tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin: 16px 0; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .episode-tab {
    padding: 8px 16px; border-radius: 8px;
    background: var(--card2); color: var(--text2);
    cursor: pointer; transition: all 0.2s;
    font-size: 13px; border: 1px solid transparent;
  }
  .episode-tab:hover { border-color: var(--accent); color: var(--text); }
  .episode-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .episode-tab .badge {
    display: inline-block; margin-left: 6px;
    background: rgba(255,255,255,0.15); padding: 0 6px;
    border-radius: 4px; font-size: 11px;
  }
  .episode-tab.active .badge { background: rgba(255,255,255,0.25); }
  /* Phase tabs */
  .phase-tabs {
    display: flex; gap: 4px;
    background: var(--card2);
    border-radius: 10px; padding: 4px;
    margin: 12px 0;
    overflow-x: auto;
  }
  .phase-tab {
    flex: 1; min-width: 100px;
    padding: 10px 12px; text-align: center;
    border-radius: 8px; font-size: 13px;
    color: var(--text2); cursor: pointer;
    transition: all 0.2s;
    border: none; background: none;
    white-space: nowrap;
  }
  .phase-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .phase-tab.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .phase-tab .step { font-size: 10px; opacity: 0.6; display: block; }
  .phase-tab .label { font-weight: 500; }
  .phase-tab.done::after { content: ' ✅'; font-size: 12px; }
  /* Phase content */
  .phase-content { display: none; }
  .phase-content.active { display: block; }
  /* Duration selector for shots */
  .duration-grid {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin: 8px 0;
  }
  .dur-opt {
    padding: 6px 14px; border-radius: 8px;
    background: var(--card2); color: var(--text2);
    border: 1px solid var(--border); cursor: pointer;
    font-size: 12px; transition: all 0.2s;
  }
  .dur-opt:hover { border-color: var(--accent); }
  .dur-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* Storyboard cards */
  .storyboard-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .sb-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .sb-num {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .sb-time {
    font-size: 12px; color: var(--gold); font-weight: 600;
    background: rgba(240,192,64,0.1);
    padding: 2px 10px; border-radius: 4px;
  }
  .sb-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .sb-tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px; background: var(--card2); color: var(--text2);
  }
  .sb-desc { font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
  .sb-prompt {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: var(--success);
    line-height: 1.7;
    font-family: 'SF Mono', 'Courier New', monospace;
    word-break: break-all;
    position: relative;
    margin-top: 8px;
  }
  .sb-prompt-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .copy-btn {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 8px; font-size: 11px;
    background: var(--card2); color: var(--text2);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; transition: all 0.2s;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* Prompt result boxes */
  .prompt-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 12px 0;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    position: relative;
  }
  .prompt-box .copy-btn { top: 12px; right: 12px; }
  .summary-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex; flex-wrap: wrap; gap: 16px;
    align-items: center;
  }
  .summary-item { text-align: center; }
  .summary-item .num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .summary-item .label { font-size: 11px; color: var(--text2); }
  .loading-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; display: none; }
  .loading-bar.active { display: block; }
  .loading-bar-inner { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 2px; animation: loading 2s ease-in-out infinite; }
  @keyframes loading { 0% { width: 0%; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0%; margin-left: 100%; } }
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 999;
    padding: 12px 20px; border-radius: 8px;
    font-size: 13px; transform: translateX(120%); transition: transform 0.3s;
    max-width: 360px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: #065f46; color: #a7f3d0; border: 1px solid #059669; }
  .toast.error { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
  .toast.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
  /* Split config */
  .split-config { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; margin: 12px 0; padding: 12px; background: var(--card2); border-radius: 8px; }
  .placeholder-text { color: var(--text2); font-size: 13px; text-align: center; padding: 40px 20px; }
  .history-list { display: none; margin-top: 16px; }
  .history-list.active { display: block; }
  .history-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item .h-name { font-size: 14px; font-weight: 500; }
  .history-item .h-meta { font-size: 11px; color: var(--text2); }
  .history-item .h-del { color: var(--text2); cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.2s; }
  .history-item .h-del:hover { background: rgba(255,0,0,0.1); color: #f87171; }
  /* Episode content editor */
  .episode-content { display: none; }
  .episode-content.active { display: block; }
  .episode-preview { 
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin: 12px 0;
    max-height: 200px; overflow-y: auto;
    font-size: 13px; line-height: 1.7;
    white-space: pre-wrap;
  }
  @media (max-width: 600px) {
    .container { padding: 16px 12px; }
    .section-card { padding: 16px; }
    .config-row { flex-direction: column; align-items: stretch; }
    .phase-tab { min-width: 80px; font-size: 12px; padding: 8px; }
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">
    <div class="nav-logo">金</div>
    <div>
      <div class="nav-title">一抹金蓝 <span>·</span> 短剧分镜工厂 <span style="font-size:11px;color:var(--gold);">v3</span></div>
      <div class="nav-subtitle">AI Storyboard Factory · 人物→场景→分镜 三段式生成</div>
    </div>
  </div>
  <div class="nav-actions">
    <button class="btn btn-ghost btn-sm" onclick="toggleHistory()">📋 历史</button>
    <button class="btn btn-ghost btn-sm" onclick="showSettings()">⚙️</button>
  </div>
</div>

<div class="container">

  <!-- ============ STEP 1: 上传/粘贴剧本 ============ -->
  <div class="section-card" id="step-upload">
    <h2>📂 上传剧本</h2>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📄</div>
      <div class="text">点击上传 或 拖拽剧本文件到此处</div>
      <div class="sub">支持 .txt · .docx</div>
      <input type="file" id="file-input" accept=".txt,.docx" onchange="handleFileUpload(event)">
    </div>
    <p style="text-align:center;color:var(--text2);font-size:13px;">— 或 直接粘贴剧本内容 —</p>
    <textarea id="script-input" placeholder="在此粘贴剧本内容（支持多集剧本）&#10;&#10;示例：&#10;第1集&#10;场景1 办公室·日&#10;李明坐在办公桌前发呆...&#10;&#10;第2集&#10;场景1 林荫道·黄昏&#10;王婷独自走在林荫道上..."></textarea>
    <div class="char-counter"><span id="char-count">0</span> 字</div>
  </div>

  <!-- ============ STEP 2: 分集配置 ============ -->
  <!-- Global Config -->
  <div class="section-card" id="global-config">
    <h2>⚙️ 生成配置</h2>
    <div class="config-row">
      <div class="config-group">
        <label>风格预设</label>
        <select id="style-preset">
          <option value="realistic">仿真人写实</option>
          <option value="cinematic">电影质感</option>
          <option value="action">快节奏动作</option>
          <option value="romantic">浪漫情感</option>
          <option value="thriller">悬疑惊悚</option>
        </select>
      </div>
      <div class="config-group">
        <label>AI模型</label>
        <select id="model-select">
          <option value="gpt-4o">GPT-4o</option>
          <option value="grok">Grok</option>
          <option value="deepseek">DeepSeek</option>
          <option value="claude">Claude</option>
        </select>
      </div>
      <div class="config-group" style="flex:1;min-width:200px;">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="你的 API Key" style="width:100%;">
      </div>
    </div>
  </div>

  <div class="section-card" id="step-split" style="display:none;">
    <h2>📑 分集设置</h2>
    <div class="split-config">
      <div class="config-group">
        <label>每集时长（可选）</label>
        <select id="episode-duration">
          <option value="0">不指定，按剧本关键字自动分集</option>
          <option value="30">30秒</option>
          <option value="45">45秒</option>
          <option value="60">60秒</option>
          <option value="90">90秒</option>
          <option value="120">120秒</option>
          <option value="180">180秒</option>
          <option value="300">300秒</option>
        </select>
      </div>
      <div class="config-group">
        <label>分集关键字</label>
        <input type="text" id="split-keywords" value="第\d+集,第\d+章,Episode" placeholder="默认: 第\d+集,第\d+章" style="width:240px;">
      </div>
      <button class="btn btn-primary" onclick="splitEpisodes()">🔄 执行分集</button>
    </div>

    <!-- Episode tabs -->
    <div class="episode-tabs" id="episode-tabs"></div>

    <!-- Episode content area -->
    <div id="episode-content-area"></div>
  </div>

  <!-- Result Section -->
  <div class="result-section" id="result-section" style="display:none;">
    <div class="summary-bar" id="summary-bar">
      <div class="summary-item"><div class="num" id="sb-count">0</div><div class="label">总集数</div></div>
      <div class="summary-item"><div class="num" id="sb-total-duration">0s</div><div class="label">总时长</div></div>
      <div class="summary-item"><div class="num" id="sb-total-shots">0</div><div class="label">总镜头数</div></div>
    </div>
  </div>

  <!-- History -->
  <div class="history-list" id="history-list">
    <h3 style="font-size:16px;margin-bottom:12px;">📋 历史记录</h3>
    <div id="history-items"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== STYLES ====================
const STYLE_PROMPTS = {
  realistic: '写实风格，仿真人视觉效果，自然光影，真实场景布局，贴近真人影视的质感和色彩',
  cinematic: '电影质感，宽银幕比例，浅景深，电影级调色，戏剧性光影，大气震撼的视觉效果',
  action: '快节奏动作风格，动态运镜，快速切换，爆炸/追逐/打斗等动作场景张力十足',
  romantic: '浪漫情感风格，柔和暖色调，逆光效果，梦幻般的光影过渡，细腻的人物表情捕捉',
  thriller: '悬疑惊悚风格，冷色调，低照度，阴影交错，紧张压抑的氛围，不稳定的手持运镜',
};
const STYLE_NAMES = {
  realistic: '仿真人写实', cinematic: '电影质感', action: '快节奏动作',
  romantic: '浪漫情感', thriller: '悬疑惊悚',
};

// ==================== STATE ====================
let episodes = []; // [{title, rawContent, characters: null, scenes: null, storyboards: null}]
let currentEpisodeIdx = 0;
let currentPhaseIdx = 0; // 0=characters, 1=scenes, 2=storyboards
let shotDurationMode = 'auto'; // 'auto' | '5' | '10' | '15'

// ==================== STORAGE ====================
function saveHistory(data) {
  const history = JSON.parse(localStorage.getItem('sb3_history') || '[]');
  history.unshift({ id: Date.now(), data: data, name: data.title || `分镜 ${new Date().toLocaleString('zh-CN')}`, time: new Date().toISOString() });
  if (history.length > 10) history.pop();
  localStorage.setItem('sb3_history', JSON.stringify(history));
}

function loadHistory() { return JSON.parse(localStorage.getItem('sb3_history') || '[]'); }
function deleteHistory(id) {
  let h = loadHistory().filter(x => x.id !== id);
  localStorage.setItem('sb3_history', JSON.stringify(h));
  renderHistory();
}
function loadAPIKey() { document.getElementById('api-key').value = localStorage.getItem('sb3_api_key') || ''; }
function saveAPIKey() { localStorage.setItem('sb3_api_key', document.getElementById('api-key').value); }

// ==================== UI HELPERS ====================
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleHistory() {
  const el = document.getElementById('history-list');
  el.classList.toggle('active');
  if (el.classList.contains('active')) renderHistory();
}

function renderHistory() {
  const c = document.getElementById('history-items');
  const h = loadHistory();
  if (!h.length) { c.innerHTML = '<div style="color:var(--text2);font-size:13px;text-align:center;padding:20px;">暂无历史记录</div>'; return; }
  c.innerHTML = h.map(x => `<div class="history-item" onclick="loadHistoryItem(${x.id})"><div><div class="h-name">${x.name}</div><div class="h-meta">${new Date(x.time).toLocaleString('zh-CN')}</div></div><span class="h-del" onclick="event.stopPropagation();deleteHistory(${x.id})">✕</span></div>`).join('');
}

function loadHistoryItem(id) {
  const item = loadHistory().find(x => x.id === id);
  if (!item) return;
  episodes = item.data.episodes || [];
  if (episodes.length === 0) { showToast('历史数据无效', 'error'); return; }
  currentEpisodeIdx = 0; currentPhaseIdx = 0;
  document.getElementById('step-split').style.display = 'block';
  document.getElementById('result-section').style.display = 'block';
  document.getElementById('history-list').classList.remove('active');
  renderEpisodeTabs();
  showEpisode(0);
  updateSummary();
  showToast('已加载历史记录');
}

function showSettings() {
  const k = document.getElementById('api-key');
  k.type = k.type === 'password' ? 'text' : 'password';
  if (k.type === 'text') setTimeout(() => k.type = 'password', 3000);
}

// ==================== FILE UPLOAD ====================
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'txt') {
    reader.onload = e => {
      document.getElementById('script-input').value = e.target.result;
      document.getElementById('char-count').textContent = e.target.result.length;
      showToast('✅ 已读取剧本文件');
      onScriptReady();
    };
    reader.readAsText(file);
  } else if (ext === 'docx') {
    reader.onload = async e => {
      try {
        const result = await mammoth.extractRawText({arrayBuffer: e.target.result});
        document.getElementById('script-input').value = result.value;
        document.getElementById('char-count').textContent = result.value.length;
        showToast('✅ 已读取 Word 文件');
        onScriptReady();
      } catch(err) {
        showToast('❌ 读取 Word 文件失败: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    showToast('❌ 不支持的文件格式，请上传 .txt 或 .docx', 'error');
  }
  event.target.value = '';
}

// Drag & drop
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) {
    const input = document.getElementById('file-input');
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    handleFileUpload({target: input});

});

// ==================== SPLIT EPISODES ====================
function splitEpisodes() {
  const script = document.getElementById('script-input').value.trim();
  if (!script) { showToast('请先输入或上传剧本内容', 'error'); return; }

  const epDuration = parseInt(document.getElementById('episode-duration').value);
  const keywordsRaw = document.getElementById('split-keywords').value.trim() || '第\\d+集,第\\d+章,Episode';
  const keywords = keywordsRaw.split(',').map(k => k.trim()).filter(Boolean);

  let parts = [];

  if (epDuration > 0) {
    // Split by character count (~3 chars = ~1 sec for Chinese)
    const charsPerEp = epDuration * 3;
    let remaining = script;
    let epIdx = 1;
    while (remaining.length > 0) {
      let chunk = remaining.substring(0, charsPerEp);
      // Try to break at paragraph boundary near the limit
      const nextNewline = chunk.lastIndexOf('\n');
      if (nextNewline > charsPerEp * 0.7) {
        chunk = remaining.substring(0, nextNewline);
      }
      parts.push({ title: `第${epIdx}集`, content: chunk.trim() });
      remaining = remaining.substring(chunk.length).trim();
      epIdx++;
      if (epIdx > 200) break; // safety
    }
  } else {
    // Split by keywords
    const lines = script.split('\n');
    let currentEp = { title: '第1集', content: '' };
    let epNum = 1;
    let found = false;

    for (const line of lines) {
      let isNewEp = false;
      for (const kw of keywords) {
        try { if (new RegExp(kw).test(line.trim())) { isNewEp = true; break; } } catch(e) {
          if (line.trim().includes(kw)) { isNewEp = true; break; }
        }
      }
      if (isNewEp) {
        if (currentEp.content.trim()) parts.push(currentEp);
        epNum++;
        currentEp = { title: line.trim() || `第${epNum}集`, content: '' };
        found = true;
      } else {
        if (currentEp.content) currentEp.content += '\n';
        currentEp.content += line;
      }
    }
    if (currentEp.content.trim()) parts.push(currentEp);
    if (!found) {
      // No keywords found, treat whole script as one episode
      parts = [{ title: '第1集', content: script }];
    }
  }

  episodes = parts.map((p, i) => ({
    title: p.title || `第${i+1}集`,
    rawContent: p.content,
    characters: null,
    scene: null,
    storyboards: null,
    durationMode: 'auto'
  }));

  renderEpisodeTabs();
  showEpisode(0);
  updateSummary();
  document.getElementById('episode-content-area').style.display = 'block';
  showToast(`✅ 已分为 ${episodes.length} 集`);
}

function parseStoryboardResponse(text) {
  const shots = [];
  const blocks = text.split('===').filter(b => b.trim());

  for (const block of blocks) {
    const lines = block.trim().split('\n').filter(l => l.trim());
    let shot = { num: shots.length + 1, duration: 6, time: '6s', desc: '', prompt: '', shotType: '', movement: '' };

    for (const line of lines) {
      const l = line.trim();
      if (l.match(/^分镜\d+/)) {
        const durMatch = l.match(/(\d+)[s秒]/);
        if (durMatch) { shot.duration = parseInt(durMatch[1]); shot.time = durMatch[1] + 's'; }
        const rangeMatch = l.match(/(\d+)[s秒]-(\d+)[s秒]/);
        if (rangeMatch) { shot.time = rangeMatch[1] + '-' + rangeMatch[2] + 's'; }
      } else if (l.startsWith('景别')) {
        shot.shotType = l.replace(/^景别[：:]\s*/, '');
      } else if (l.startsWith('运镜')) {
        shot.movement = l.replace(/^运镜[：:]\s*/, '');
      } else if (l.match(/^画面描述[：:]|^画面[：:]/)) {
        shot.desc = l.replace(/^画面描述[：:]\s*/, '').replace(/^画面[：:]\s*/, '');
      } else if (l.match(/^提示词[：:]|^prompt[：:]/i)) {
        shot.prompt = l.replace(/^提示词[：:]\s*/i, '').replace(/^[Pp]rompt[：:]\s*/i, '');
      }
    }
    if (shot.desc && shot.prompt) shots.push(shot);
  }

  // Fallback: simple line parsing
  if (shots.length === 0) {
    const lines = text.split('\n').filter(l => l.trim());
    let current = null;
    for (const line of lines) {
      const l = line.trim();
      if (l.match(/^分镜\s*\d+/)) {
        if (current && current.desc && current.prompt) shots.push(current);
        current = { num: shots.length + 1, duration: 6, time: '6s', desc: '', prompt: '', shotType: '', movement: '' };
        const durMatch = l.match(/(\d+)[s秒]/);
        if (durMatch) { current.duration = parseInt(durMatch[1]); current.time = durMatch[1] + 's'; }
      } else if (current) {
        if (l.startsWith('景别')) current.shotType = l.replace(/^景别[：:]\s*/, '');
        else if (l.startsWith('运镜')) current.movement = l.replace(/^运镜[：:]\s*/, '');
        else if (l.match(/^画面|^描述/)) current.desc += l.replace(/^画面[：:]\s*/, '').replace(/^描述[：:]\s*/, '');
        else if (l.match(/提示词|prompt|Prompt/i)) current.prompt += l.replace(/^提示词[：:]\s*/i, '').replace(/^[Pp]rompt[：:]\s*/i, '');
        else if (!l.match(/^==+/)) {
          if (!current.desc) current.desc = l;
          else if (!current.prompt) current.prompt = l;
        }
      }
    }
    if (current && current.desc && current.prompt) shots.push(current);
  }

  return shots;
}

// ==================== AI APIS ====================
function getEndpoint(model) {
  return { 'gpt-4o': 'https://api.openai.com/v1/chat/completions', 'grok': 'https://api.x.ai/v1/chat/completions', 'deepseek': 'https://api.deepseek.com/v1/chat/completions', 'claude': 'https://api.anthropic.com/v1/messages' }[model] || 'https://api.deepseek.com/v1/chat/completions';
}

async function callAI(endpoint, apiKey, model, systemPrompt, userContent) {
  if (model === 'claude') {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-3-sonnet-20241022', max_tokens: 8192, system: systemPrompt, messages: [{ role: 'user', content: userContent }] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    return data.content[0].text;
  } else {
    let m = { 'gpt-4o': 'gpt-4o', 'deepseek': 'deepseek-chat', 'grok': 'grok-beta' }[model] || model;
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: m, messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userContent }], max_tokens: 8192, temperature: 0.7 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    return data.choices[0].message.content;
  }
}

// ==================== COPY / UTILITIES ====================
function copyText(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const text = el.textContent;
  copyToClipboard(text);
}

function copyAllShots(idx) {
  const shots = episodes[idx]?.storyboards;
  if (!shots || !shots.length) return;
  let text = `=== ${episodes[idx].title} 分镜 ===\n`;
  shots.forEach((s, i) => {
    text += `分镜${i+1} | ${s.time}\n`;
    if (s.shotType) text += `景别：${s.shotType}\n`;
    if (s.movement) text += `运镜：${s.movement}\n`;
    text += `画面：${s.desc}\n`;
    text += `Prompt：${s.prompt}\n\n`;
  });
  copyToClipboard(text);
}

function copySinglePrompt(idx, shotIdx) {
  const shot = episodes[idx]?.storyboards?.[shotIdx];
  if (!shot) return;
  copyToClipboard(shot.prompt);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('✅ 已复制');
  });
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== SUMMARY ====================
function updateSummary() {
  document.getElementById('sb-count').textContent = episodes.length;
  let totalDuration = 0;
  let totalShots = 0;
  for (const ep of episodes) {
    if (ep.storyboards) {
      totalShots += ep.storyboards.length;
      totalDuration += ep.storyboards.reduce((sum, s) => sum + (s.duration || 6), 0);
    }
  }
  document.getElementById('sb-total-duration').textContent = totalDuration + 's';
  document.getElementById('sb-total-shots').textContent = totalShots;
}

// ==================== CHAR COUNTER ====================
document.getElementById('script-input').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length;
});

// ==================== INIT ====================
loadAPIKey();
