<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一抹金蓝 · 短剧分镜工厂</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text2: #8892b0;
    --accent: #4f8cff;
    --accent2: #6c63ff;
    --gold: #f0c040;
    --success: #4ade80;
    --warn: #fbbf24;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  /* Nav */
  .nav {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: bold; color: #fff;
  }
  .nav-title { font-size: 16px; font-weight: 600; }
  .nav-title span { color: var(--accent); }
  .nav-subtitle { font-size: 11px; color: var(--text2); }
  .nav-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 8px 16px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(79,140,255,0.3); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--card2); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; border-radius: 8px; }
  /* Layout */
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  /* Input Section */
  .input-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .input-section h2 {
    font-size: 18px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .input-section h2 small { font-size: 12px; color: var(--text2); font-weight: 400; }
  textarea {
    width: 100%; min-height: 180px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-size: 14px; line-height: 1.7;
    resize: vertical; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); opacity: 0.5; }
  .config-row {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin: 16px 0; align-items: center;
  }
  .config-group { display: flex; flex-direction: column; gap: 4px; }
  .config-group label { font-size: 12px; color: var(--text2); }
  .config-group select, .config-group input {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; outline: none;
  }
  .config-group select:focus, .config-group input:focus { border-color: var(--accent); }
  .char-counter {
    text-align: right; font-size: 12px; color: var(--text2);
    margin-top: 6px;
  }
  .action-bar {
    display: flex; gap: 10px; margin-top: 16px;
    flex-wrap: wrap;
  }
  /* Loading */
  .loading-bar {
    height: 3px; background: var(--border); border-radius: 2px;
    overflow: hidden; margin: 8px 0; display: none;
  }
  .loading-bar.active { display: block; }
  .loading-bar-inner {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 2px; transition: width 0.3s;
    animation: loading 2s ease-in-out infinite;
  }
  @keyframes loading {
    0% { width: 0%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }
  /* Result */
  .result-section { display: none; }
  .result-section.active { display: block; }
  .storyboard-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .sb-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }
  .sb-num {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .sb-time {
    font-size: 12px; color: var(--gold);
    font-weight: 600;
    background: rgba(240,192,64,0.1);
    padding: 2px 10px; border-radius: 4px;
  }
  .sb-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .sb-tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px; background: var(--card2); color: var(--text2);
  }
  .sb-desc {
    font-size: 14px; color: var(--text);
    margin-bottom: 8px; line-height: 1.6;
  }
  .sb-prompt {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: var(--success);
    line-height: 1.7;
    font-family: 'SF Mono', 'Courier New', monospace;
    word-break: break-all;
    position: relative;
  }
  .sb-prompt-label {
    font-size: 11px; color: var(--text2);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .copy-btn {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 8px; font-size: 11px;
    background: var(--card2); color: var(--text2);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; transition: all 0.2s;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* Summary */
  .summary-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex; flex-wrap: wrap; gap: 16px;
    align-items: center;
  }
  .summary-item { text-align: center; }
  .summary-item .num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .summary-item .label { font-size: 11px; color: var(--text2); }
  /* Toast */
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 999;
    padding: 12px 20px; border-radius: 8px;
    font-size: 13px;
    transform: translateX(120%); transition: transform 0.3s;
    max-width: 360px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: #065f46; color: #a7f3d0; border: 1px solid #059669; }
  .toast.error { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
  /* History */
  .history-list { display: none; margin-top: 16px; }
  .history-list.active { display: block; }
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item .h-name { font-size: 14px; font-weight: 500; }
  .history-item .h-meta { font-size: 11px; color: var(--text2); }
  .history-item .h-del {
    color: var(--text2); cursor: pointer; padding: 4px;
    border-radius: 4px; transition: all 0.2s;
  }
  .history-item .h-del:hover { background: rgba(255,0,0,0.1); color: #f87171; }
  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 16px 12px; }
    .input-section { padding: 16px; }
    .config-row { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">
    <div class="nav-logo">金</div>
    <div>
      <div class="nav-title">一抹金蓝 <span>·</span> 短剧分镜工厂</div>
      <div class="nav-subtitle">AI Storyboard Factory</div>
    </div>
  </div>
  <div class="nav-actions">
    <button class="btn btn-ghost btn-sm" onclick="toggleHistory()">📋 历史</button>
    <button class="btn btn-ghost btn-sm" onclick="showSettings()">⚙️</button>
  </div>
</div>

<div class="container">
  <!-- Input -->
  <div class="input-section">
    <h2>📝 输入剧本 <small>粘贴剧本内容，AI自动拆分为分镜</small></h2>

    <div class="config-row">
      <div class="config-group">
        <label>风格预设</label>
        <select id="style-preset">
          <option value="realistic">仿真人写实</option>
          <option value="cinematic">电影质感</option>
          <option value="action">快节奏动作</option>
          <option value="romantic">浪漫情感</option>
          <option value="thriller">悬疑惊悚</option>
        </select>
      </div>
      <div class="config-group">
        <label>AI模型</label>
        <select id="model-select">
          <option value="gpt-4o">GPT-4o</option>
          <option value="grok">Grok</option>
          <option value="deepseek">DeepSeek</option>
          <option value="claude">Claude</option>
        </select>
      </div>
      <div class="config-group" style="flex:1;min-width:200px;">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="输入你的 API Key" style="width:100%;">
      </div>
    </div>

    <textarea id="script-input" placeholder="在此粘贴剧本内容&#10;&#10;示例：&#10;场景1 办公室·日&#10;李明坐在办公桌前，盯着电脑屏幕发呆。&#10;王婷走过来，敲了敲他的桌子。&#10;王婷："又在摸鱼？老板找你。"&#10;李明吓了一跳，赶紧坐直。&#10;&#10;场景2 走廊·日&#10;李明快步走向老板办公室，遇到同事张伟。&#10;张伟："哥们，劝你做好心理准备。"&#10;李明苦笑："又怎么了？"&#10;张伟拍拍他肩膀走了。"></textarea>
    <div class="char-counter"><span id="char-count">0</span> 字</div>

    <div class="loading-bar" id="loading-bar"><div class="loading-bar-inner"></div></div>

    <div class="action-bar">
      <button class="btn btn-primary" onclick="generateStoryboard()">🎬 生成分镜</button>
      <button class="btn btn-ghost" onclick="clearAll()">清空</button>
      <button class="btn btn-ghost" onclick="copyAll()">📋 复制全部</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-section" id="result-section">
    <div class="summary-bar" id="summary-bar">
      <div class="summary-item"><div class="num" id="sb-count">0</div><div class="label">分镜数</div></div>
      <div class="summary-item"><div class="num" id="sb-duration">0s</div><div class="label">总时长</div></div>
      <div class="summary-item"><div class="num" id="sb-words">0</div><div class="label">剧本字数</div></div>
    </div>
    <div id="storyboard-list"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-ghost" onclick="copyAll()">📋 复制全部提示词</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-list" id="history-list">
    <h3 style="font-size:16px;margin-bottom:12px;">📋 历史记录</h3>
    <div id="history-items"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== Config ====================
const STYLE_PROMPTS = {
  realistic: '写实风格，仿真人视觉效果，自然光影，真实场景布局，贴近真人影视的质感和色彩',
  cinematic: '电影质感，宽银幕比例，浅景深，电影级调色，戏剧性光影，大气震撼的视觉效果',
  action: '快节奏动作风格，动态运镜，快速切换，爆炸/追逐/打斗等动作场景张力十足',
  romantic: '浪漫情感风格，柔和暖色调，逆光效果，梦幻般的光影过渡，细腻的人物表情捕捉',
  thriller: '悬疑惊悚风格，冷色调，低照度，阴影交错，紧张压抑的氛围，不稳定的手持运镜',
};

const STYLE_NAMES = {
  realistic: '仿真人写实', cinematic: '电影质感', action: '快节奏动作',
  romantic: '浪漫情感', thriller: '悬疑惊悚',
};

// ==================== Storage ====================
function saveHistory(name, scenes) {
  const history = JSON.parse(localStorage.getItem('sb_history') || '[]');
  history.unshift({
    id: Date.now(),
    name: name || `分镜 ${new Date().toLocaleString('zh-CN')}`,
    scenes: scenes,
    count: scenes.length,
    time: new Date().toISOString()
  });
  if (history.length > 20) history.pop();
  localStorage.setItem('sb_history', JSON.stringify(history));
}

function loadHistory() {
  return JSON.parse(localStorage.getItem('sb_history') || '[]');
}

function deleteHistory(id) {
  let history = loadHistory();
  history = history.filter(h => h.id !== id);
  localStorage.setItem('sb_history', JSON.stringify(history));
  renderHistory();
}

function loadAPIKey() {
  const key = localStorage.getItem('sb_api_key') || '';
  document.getElementById('api-key').value = key;
}

function saveAPIKey() {
  const key = document.getElementById('api-key').value;
  localStorage.setItem('sb_api_key', key);
}

// ==================== UI ====================
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleHistory() {
  const el = document.getElementById('history-list');
  el.classList.toggle('active');
  if (el.classList.contains('active')) renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-items');
  const history = loadHistory();
  if (history.length === 0) {
    container.innerHTML = '<div style="color:var(--text2);font-size:13px;text-align:center;padding:20px;">暂无历史记录</div>';
    return;
  }
  container.innerHTML = history.map(h => `
    <div class="history-item" onclick="loadHistoryItem(${h.id})">
      <div>
        <div class="h-name">${h.name}</div>
        <div class="h-meta">${h.count} 个分镜 · ${new Date(h.time).toLocaleString('zh-CN')}</div>
      </div>
      <span class="h-del" onclick="event.stopPropagation();deleteHistory(${h.id})">✕</span>
    </div>
  `).join('');
}

function loadHistoryItem(id) {
  const history = loadHistory();
  const item = history.find(h => h.id === id);
  if (!item) return;
  displayStoryboards(item.scenes);
  document.getElementById('history-list').classList.remove('active');
  showToast('已加载历史记录');
}

function showSettings() {
  const keyInput = document.getElementById('api-key');
  const currentType = keyInput.type;
  keyInput.type = currentType === 'password' ? 'text' : 'password';
  if (keyInput.type === 'text') {
    setTimeout(() => { keyInput.type = 'password'; }, 3000);
  }
}

// ==================== Script Parser ====================
function parseScript(text) {
  if (!text.trim()) return [];
  const lines = text.trim().split('\n').filter(l => l.trim());
  return lines.map(l => l.trim()).filter(l => l.length > 0);
}

// ==================== AI Generation ====================
async function generateStoryboard() {
  const script = document.getElementById('script-input').value.trim();
  if (!script) {
    showToast('请先输入剧本内容', 'error');
    return;
  }

  const style = document.getElementById('style-preset').value;
  const model = document.getElementById('model-select').value;
  const apiKey = document.getElementById('api-key').value.trim();

  if (!apiKey) {
    showToast('请输入 API Key (设置中可查看/隐藏)', 'error');
    return;
  }

  saveAPIKey();

  const loadingBar = document.getElementById('loading-bar');
  loadingBar.classList.add('active');

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';

  try {
    const systemPrompt = `你是一位专业短剧分镜师和AI视频提示词工程师。请将用户提供的剧本内容拆分为连续的分镜。

每个分镜必须包含：
1. 分镜编号（从1开始）
2. 时间长度（每段6秒）
3. 画面描述（中文，简洁明了，20-30字）
4. AI视频提示词（英文，详细描述景别、镜头运动、人物动作、光影、场景）

风格要求：${STYLE_PROMPTS[style]}

输出格式（严格按此格式，不要多余内容）：
===
分镜1 | 0-6s
画面描述：...
提示词：...
===
分镜2 | 6-12s
画面描述：...
提示词：...
===

注意：
- 每个分镜固定6秒
- 分镜之间必须完美衔接（角色、场景、动作逻辑连贯）
- 提示词用英文，包含：shot type, camera movement, lighting, character action, setting
- 画面描述用中文
- 输出纯文本，不要markdown格式`;

    const endpoint = getEndpoint(model);
    const result = await callAI(endpoint, apiKey, model, systemPrompt, script);

    const scenes = parseAIResponse(result);
    if (scenes.length === 0) {
      showToast('AI返回格式异常，请重试', 'error');
    } else {
      displayStoryboards(scenes);
      saveHistory(`${STYLE_NAMES[style]} · ${scenes.length}镜`, scenes);
      showToast(`✅ 成功生成 ${scenes.length} 个分镜`);
    }
  } catch (err) {
    showToast('生成失败: ' + err.message, 'error');
  } finally {
    loadingBar.classList.remove('active');
    btn.disabled = false;
    btn.textContent = '🎬 生成分镜';
  }
}

function getEndpoint(model) {
  const endpoints = {
    'gpt-4o': 'https://api.openai.com/v1/chat/completions',
    'grok': 'https://api.x.ai/v1/chat/completions',
    'deepseek': 'https://api.deepseek.com/v1/chat/completions',
    'claude': 'https://api.anthropic.com/v1/messages',
  };
  return endpoints[model] || endpoints['deepseek'];
}

async function callAI(endpoint, apiKey, model, systemPrompt, userContent) {
  if (model === 'claude') {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-3-sonnet-20241022',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContent }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    return data.content[0].text;
  } else {
    let actualModel = model;
    if (model === 'gpt-4o') actualModel = 'gpt-4o';
    else if (model === 'deepseek') actualModel = 'deepseek-chat';
    else if (model === 'grok') actualModel = 'grok-beta';

    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: actualModel,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userContent }
        ],
        max_tokens: 4096,
        temperature: 0.7
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    return data.choices[0].message.content;
  }
}

function parseAIResponse(text) {
  const scenes = [];
  const blocks = text.split('===').filter(b => b.trim());

  for (const block of blocks) {
    const lines = block.trim().split('\n').filter(l => l.trim());
    let num = scenes.length + 1;
    let time = `${(scenes.length * 6)}-${(scenes.length + 1) * 6}s`;
    let desc = '';
    let prompt = '';

    for (const line of lines) {
      const l = line.trim();
      if (l.match(/^分镜\d+/)) {
        const timeMatch = l.match(/(\d+)[s秒]-(\d+)[s秒]/);
        if (timeMatch) time = `${timeMatch[1]}-${timeMatch[2]}s`;
        const numMatch = l.match(/(\d+)/);
        if (numMatch) num = parseInt(numMatch[1]);
      } else if (l.startsWith('画面描述') || l.startsWith('画面')) {
        desc = l.replace(/^画面描述[：:]\s*/, '').replace(/^画面[：:]\s*/, '');
      } else if (l.startsWith('提示词') || l.startsWith('Prompt') || l.startsWith('prompt')) {
        prompt = l.replace(/^提示词[：:]\s*/i, '').replace(/^[Pp]rompt[：:]\s*/i, '');
      }
    }

    if (desc && prompt) {
      scenes.push({ num, time, desc, prompt });
    }
  }

  // Fallback: if no structured parsing worked, try line-by-line
  if (scenes.length === 0) {
    const lines = text.split('\n').filter(l => l.trim());
    let current = null;
    for (const line of lines) {
      const l = line.trim();
      if (l.match(/^分镜\s*\d+/)) {
        if (current && current.desc && current.prompt) scenes.push(current);
        current = { num: scenes.length + 1, time: '', desc: '', prompt: '' };
        const timeMatch = l.match(/(\d+)[s秒]-(\d+)[s秒]/);
        if (timeMatch) current.time = `${timeMatch[1]}-${timeMatch[2]}s`;
        if (!current.time) current.time = `${(scenes.length) * 6}-${(scenes.length + 1) * 6}s`;
      } else if (current) {
        if (l.startsWith('画面') || l.startsWith('描述')) {
          current.desc += l.replace(/^画面[：:]\s*/, '').replace(/^描述[：:]\s*/, '');
        } else if (l.match(/提示词|prompt|Prompt/i)) {
          current.prompt += l.replace(/^提示词[：:]\s*/i, '').replace(/^[Pp]rompt[：:]\s*/i, '');
        } else if (!l.match(/^==+$/) && !l.match(/^\d+[s秒]-\d+[s秒]/)) {
          if (!current.desc) current.desc = l;
          else if (!current.prompt) current.prompt = l;
        }
      }
    }
    if (current && current.desc && current.prompt) scenes.push(current);
  }

  // Final fallback: split by numbered items
  if (scenes.length === 0) {
    const parts = text.split(/\d+[\.、\)]/).filter(p => p.trim());
    for (let i = 0; i < parts.length && i < 30; i++) {
      scenes.push({
        num: i + 1,
        time: `${i * 6}-${(i + 1) * 6}s`,
        desc: parts[i].trim().substring(0, 100),
        prompt: parts[i].trim()
      });
    }
  }

  return scenes;
}

// ==================== Display ====================
function displayStoryboards(scenes) {
  const container = document.getElementById('storyboard-list');
  document.getElementById('result-section').classList.add('active');

  document.getElementById('sb-count').textContent = scenes.length;
  document.getElementById('sb-duration').textContent = scenes.length * 6 + 's';
  document.getElementById('sb-words').textContent = document.getElementById('script-input').value.trim().length;

  container.innerHTML = scenes.map((s, i) => `
    <div class="storyboard-card" style="animation-delay:${i * 0.05}s">
      <div class="sb-header">
        <div class="sb-num">${s.num}</div>
        <div class="sb-time">⏱ ${s.time || `${(i*6)}-${(i+1)*6}s`}</div>
        <div class="sb-tags">
          <span class="sb-tag">6秒</span>
          <span class="sb-tag">${STYLE_NAMES[document.getElementById('style-preset').value]}</span>
        </div>
      </div>
      <div class="sb-desc">🎨 ${s.desc || '画面描述'}</div>
      <div class="sb-prompt">
        <div class="sb-prompt-label">🤖 Prompt</div>
        <button class="copy-btn" onclick="copyPrompt(this, ${i})">复制</button>
        <div>${s.prompt || '提示词'}</div>
      </div>
    </div>
  `).join('');

  // Scroll to result
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPrompt(btn, index) {
  const scenes = getCurrentScenes();
  if (!scenes || !scenes[index]) return;
  const text = scenes[index].prompt;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '复制'; }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '复制'; }, 2000);
  });
}

function getCurrentScenes() {
  const cards = document.querySelectorAll('.storyboard-card');
  const scenes = [];
  cards.forEach(card => {
    const numText = card.querySelector('.sb-num')?.textContent || '0';
    const timeText = card.querySelector('.sb-time')?.textContent?.replace('⏱ ', '') || '';
    const descText = card.querySelector('.sb-desc')?.textContent?.replace('🎨 ', '') || '';
    const promptText = card.querySelector('.sb-prompt > div:last-child')?.textContent || '';
    scenes.push({
      num: parseInt(numText),
      time: timeText,
      desc: descText,
      prompt: promptText
    });
  });
  return scenes;
}

function copyAll() {
  const scenes = getCurrentScenes();
  if (scenes.length === 0) {
    showToast('没有可复制的内容', 'error');
    return;
  }
  const style = STYLE_NAMES[document.getElementById('style-preset').value];
  let text = `=== 一抹金蓝 · 短剧分镜工厂 ===\n`;
  text += `风格：${style}\n`;
  text += `总时长：${scenes.length * 6}s (${scenes.length}镜)\n\n`;
  scenes.forEach((s, i) => {
    text += `【分镜${s.num || i+1}】${s.time || `${i*6}-${(i+1)*6}s`}\n`;
    text += `画面：${s.desc}\n`;
    text += `Prompt：${s.prompt}\n\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast(`✅ 已复制 ${scenes.length} 个分镜`);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`✅ 已复制 ${scenes.length} 个分镜`);
  });
}

function clearAll() {
  if (!confirm('确认清空？历史记录不受影响。')) return;
  document.getElementById('script-input').value = '';
  document.getElementById('storyboard-list').innerHTML = '';
  document.getElementById('result-section').classList.remove('active');
  document.getElementById('char-count').textContent = '0';
}

// ==================== Char Counter ====================
document.getElementById('script-input').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length;
});

// ==================== Init ====================
loadAPIKey();
</script>
